<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Corso AI + Ecom · Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;
  --panel:#111;
  --ink:#f5f5f5;
  --fog:#9a9a9a;
  --silt:#5a5a5a;
  --hair:#1f1f1f;
  --accent:#fff;
  --display:"Space Grotesk",system-ui,sans-serif;
  --body:"Inter",system-ui,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--ink);font-family:var(--body);overflow:hidden}

.app{display:flex;flex-direction:column;height:100vh}

.bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;
  border-bottom:1px solid var(--hair);
  background:var(--panel);
}
.brand{
  font-family:var(--display);
  font-weight:600;
  font-size:18px;
  letter-spacing:-.01em;
}
.brand b{color:var(--fog);font-weight:400;margin-left:8px}
.meta{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:var(--silt);
}

.tabs{
  display:flex;
  gap:0;
  padding:0 24px;
  background:var(--panel);
  border-bottom:1px solid var(--hair);
  overflow-x:auto;
}
.tab{
  flex:0 0 auto;
  padding:18px 22px;
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--silt);
  background:none;border:none;cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .15s ease;
  white-space:nowrap;
}
.tab:hover{color:var(--fog)}
.tab.active{
  color:var(--ink);
  border-bottom-color:var(--accent);
}
.tab .n{
  display:inline-block;
  font-size:10px;
  color:var(--silt);
  margin-right:8px;
  letter-spacing:.2em;
}

.frame{
  flex:1;
  position:relative;
  background:#fff;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}
.frame iframe{
  position:absolute;
  inset:0;
  width:100%;height:100%;
  border:0;
  display:none;
}
.frame iframe.active{display:block}
@media (max-width:900px){
  .frame iframe.active{
    position:relative;
    width:100%;
    height:calc(100vh - 110px);
    min-height:calc(100vh - 110px);
  }
}

.hint{
  position:fixed;
  bottom:18px;right:24px;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:var(--silt);
  background:rgba(10,10,10,.75);
  padding:8px 14px;
  border:1px solid var(--hair);
  border-radius:2px;
  pointer-events:none;
  z-index:50;
}

/* Mobile */
@media (max-width:640px){
  .bar{padding:12px 16px}
  .brand{font-size:14px;letter-spacing:-.005em}
  .brand b{margin-left:4px;font-size:12px}
  .meta{font-size:9px;letter-spacing:.22em}
  .tabs{padding:0 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:14px 14px;font-size:11px;letter-spacing:.14em}
  .tab .n{font-size:9px;margin-right:5px}
}
@media (max-width:380px){
  .meta{display:none}
}
</style>
</head>
<body>

<div class="app">

  <div class="bar">
    <div class="brand">Corso AI + Ecom <b>con Claude</b></div>
    <div class="meta">Hub · Lucio</div>
  </div>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-target="t-scaletta"><span class="n">00</span>Scaletta</button>
    <button class="tab"          data-target="t-script"><span class="n">01</span>Script</button>
    <button class="tab"          data-target="t-risorse"><span class="n">↗</span>Risorse</button>
  </nav>

  <div class="frame" id="frame">
    <iframe id="t-scaletta" class="active" src="corso_scaletta_completa.html?v=10" loading="eager"></iframe>
    <iframe id="t-script"   src="corso_script_dettagliato.html?v=11" loading="lazy"></iframe>
    <iframe id="t-risorse"  src="corso_risorse.html?v=3" loading="lazy"></iframe>
  </div>

</div>

<script>
const tabs = document.querySelectorAll('.tab');
const frames = document.querySelectorAll('#frame iframe');

function activate(id){
  tabs.forEach(t => t.classList.toggle('active', t.dataset.target === id));
  frames.forEach(f => f.classList.toggle('active', f.id === id));
  location.hash = id.replace('t-','');
}

tabs.forEach(t => t.addEventListener('click', () => activate(t.dataset.target)));

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const map = {'1':'t-scaletta','2':'t-script','3':'t-risorse'};
  if (map[e.key]) activate(map[e.key]);
});

// deep-link via hash
const h = location.hash.replace('#','');
const valid = ['scaletta','script','risorse'];
if (valid.includes(h)) activate('t-'+h);
</script>

</body>
</html>
